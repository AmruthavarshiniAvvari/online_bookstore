<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<head>

    <title>All Books</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <link rel="stylesheet" href="/css/style.css">

</head>

<body>

<!-- NAVBAR -->

<nav class="navbar navbar-dark">

    <div class="container-fluid">

        <a class="navbar-brand fw-bold fs-3"
           href="/books">

            📚 Online Bookstore

        </a>

        <div class="d-flex gap-2">

            <a href="/cart"
               class="btn btn-success">

                Cart

            </a>

            <div sec:authorize="hasAuthority('ADMIN')">

                <a href="/dashboard"
                   class="btn btn-warning">

                    Dashboard

                </a>

            </div>

            <form th:action="@{/logout}"
                  method="post">

                <button class="btn btn-danger">

                    Logout

                </button>

            </form>

        </div>

    </div>

</nav>

<!-- BOOK SECTION -->

<div class="container py-5">

    <!-- HEADER -->

    <div class="d-flex justify-content-between align-items-center mb-4 flex-wrap gap-3">

        <h1>
            📚 All Books
        </h1>

        <div class="d-flex gap-3 flex-wrap">

            <!-- SEARCH -->

            <form action="/search"
                  method="get"
                  class="d-flex">

                <input type="text"
                       name="keyword"
                       placeholder="Search books..."
                       class="form-control me-2">

                <button class="btn btn-primary">

                    Search

                </button>

            </form>

            <!-- ADD BOOK -->

            <div sec:authorize="hasAuthority('ADMIN')">

                <a href="/addBook"
                   class="btn btn-primary">

                    + Add Book

                </a>

            </div>

        </div>

    </div>

    <!-- EMPTY BOOK MESSAGE -->

    <div th:if="${#lists.isEmpty(books)}"
         class="glass-card text-center">

        <h3 class="mb-3">
            No books available
        </h3>

    </div>

    <!-- BOOK TABLE -->

    <div th:if="${!#lists.isEmpty(books)}"
         class="glass-card">

        <table class="table table-hover align-middle">

            <thead>

            <tr>
                <th>ID</th>
                <th>Title</th>
                <th>Author</th>
                <th>Category</th>
                <th>Price</th>
                <th>Stock</th>
                <th>Actions</th>
            </tr>

            </thead>

            <tbody>

            <tr th:each="book : ${books}">

                <td th:text="${book.id}"></td>

                <td th:text="${book.title}"></td>

                <td th:text="${book.author}"></td>

                <td th:text="${book.category}"></td>

                <td th:text="${book.price}"></td>

                <td th:text="${book.stock}"></td>

                <td class="d-flex gap-2 flex-wrap">

                    <!-- EDIT -->

                    <div sec:authorize="hasAuthority('ADMIN')">

                        <a th:href="@{/edit/{id}(id=${book.id})}"
                           class="btn btn-warning btn-sm">

                            Edit

                        </a>

                    </div>

                    <!-- DELETE -->

                    <div sec:authorize="hasAuthority('ADMIN')">

                        <a th:href="@{/delete/{id}(id=${book.id})}"
                           class="btn btn-danger btn-sm">

                            Delete

                        </a>

                    </div>

                    <!-- ADD TO CART -->

                    <a th:href="@{/addToCart/{id}(id=${book.id})}"
                       class="btn btn-success btn-sm">

                        Add To Cart

                    </a>

                </td>

            </tr>

            </tbody>

        </table>

    </div>

    <!-- PAGINATION -->

    <div class="d-flex justify-content-center mt-5">

        <nav>

            <ul class="pagination">

                <!-- PREVIOUS -->

                <li class="page-item"
                    th:if="${currentPage > 0}">

                    <a class="page-link"
                       th:href="@{/books(page=${currentPage - 1})}">

                        Previous

                    </a>

                </li>

                <!-- PAGE NUMBERS -->

                <li class="page-item"
                    th:each="i : ${#numbers.sequence(0, totalPages - 1)}">

                    <a class="page-link"
                       th:href="@{/books(page=${i})}"
                       th:text="${i + 1}">

                    </a>

                </li>

                <!-- NEXT -->

                <li class="page-item"
                    th:if="${currentPage < totalPages - 1}">

                    <a class="page-link"
                       th:href="@{/books(page=${currentPage + 1})}">

                        Next

                    </a>

                </li>

            </ul>

        </nav>

    </div>

</div>

</body>

</html>
