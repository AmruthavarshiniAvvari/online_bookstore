<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

    <title>Edit Book</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <link rel="stylesheet" href="/css/style.css">

</head>

<body>

<div class="container d-flex justify-content-center align-items-center"
     style="min-height:100vh;">

    <div class="glass-card"
         style="width:600px;">

        <h1 class="text-center mb-4">
            Edit Book
        </h1>

        <form th:action="@{/save}"
              th:object="${book}"
              method="post">

            <input type="hidden"
                   th:field="*{id}">

            <div class="mb-3">

                <label class="mb-2">
                    Book Title
                </label>

                <input type="text"
                       th:field="*{title}"
                       class="form-control form-control-lg">

            </div>

            <div class="mb-3">

                <label class="mb-2">
                    Author
                </label>

                <input type="text"
                       th:field="*{author}"
                       class="form-control form-control-lg">

            </div>

            <div class="mb-3">

                <label class="mb-2">
                    Category
                </label>

                <input type="text"
                       th:field="*{category}"
                       class="form-control form-control-lg">

            </div>

            <div class="row">

                <div class="col-md-6 mb-3">

                    <label class="mb-2">
                        Price
                    </label>

                    <input type="number"
                           th:field="*{price}"
                           class="form-control form-control-lg">

                </div>

                <div class="col-md-6 mb-3">

                    <label class="mb-2">
                        Stock
                    </label>

                    <input type="number"
                           th:field="*{stock}"
                           class="form-control form-control-lg">

                </div>

            </div>

            <div class="d-grid mt-4">

                <button type="submit"
                        class="btn btn-primary btn-lg">

                    Update Book

                </button>

            </div>

        </form>

    </div>

</div>

</body>

</html>
